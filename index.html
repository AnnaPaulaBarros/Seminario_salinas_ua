<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SALInA – Assistente do Aluno da Universidade de Aveiro</title>

  <!-- ============================================================
       ESTILOS GLOBAIS E PALETA INSTITUCIONAL
       Cores principais:
         --ua-teal:      #007A87  (azul-turquesa UA)
         --ua-teal-dark: #005F6B
         --ua-teal-light:#E0F4F6
         --ua-gray:      #F4F6F7  (cinza claro de fundo)
  ============================================================ -->
  <style>
    /* ---- Reset & base ---- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ua-teal:       #007A87;
      --ua-teal-dark:  #005F6B;
      --ua-teal-light: #E0F4F6;
      --ua-gray:       #F4F6F7;
      --ua-white:      #FFFFFF;
      --ua-text:       #2C3E50;
      --ua-text-muted: #7F8C8D;
      --ua-bubble-bot: #FFFFFF;
      --ua-bubble-usr: #007A87;
      --radius-bubble: 18px;
      --shadow:        0 4px 24px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--ua-gray);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      color: var(--ua-text);
    }

    /* ---- Contentor principal do chat ---- */
    .chat-wrapper {
      width: 100%;
      max-width: 680px;
      background: var(--ua-white);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Cabeçalho ---- */
    .chat-header {
      background: linear-gradient(135deg, var(--ua-teal) 0%, var(--ua-teal-dark) 100%);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chat-header .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--ua-white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .chat-header .info h1 {
      color: var(--ua-white);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .chat-header .info p {
      color: rgba(255,255,255,0.75);
      font-size: 0.78rem;
      margin-top: 2px;
    }

    .chat-header .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #4CD964;
      display: inline-block;
      margin-right: 5px;
    }

    /* ---- Área de mensagens ---- */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 400px;
      max-height: 520px;
      background: var(--ua-gray);
    }

    /* ---- Balão genérico ---- */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeSlideIn 0.25s ease;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Balão do utilizador (lado direito) */
    .message.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.user .bubble {
      background: var(--ua-bubble-usr);
      color: var(--ua-white);
      border-radius: var(--radius-bubble) var(--radius-bubble) 4px var(--radius-bubble);
    }

    /* Balão do assistente (lado esquerdo) */
    .message.bot {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message.bot .bubble {
      background: var(--ua-bubble-bot);
      color: var(--ua-text);
      border-radius: var(--radius-bubble) var(--radius-bubble) var(--radius-bubble) 4px;
      border: 1px solid #E3E8EA;
    }

    .bubble {
      padding: 10px 14px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
    }

    /* Timestamp abaixo de cada balão */
    .message .timestamp {
      font-size: 0.68rem;
      color: var(--ua-text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    /* Link dentro de resposta do bot */
    .bubble a.response-link {
      display: inline-block;
      margin-top: 8px;
      background: var(--ua-teal);
      color: var(--ua-white);
      text-decoration: none;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    .bubble a.response-link:hover {
      background: var(--ua-teal-dark);
    }

    /* Indicador de digitação (três pontos animados) */
    .typing-indicator .bubble {
      padding: 12px 16px;
    }

    .typing-indicator .dots span {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ua-teal);
      margin: 0 2px;
      animation: bounce 1.1s infinite ease-in-out;
    }

    .typing-indicator .dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-indicator .dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ---- Área de input ---- */
    .chat-input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-top: 1px solid #E3E8EA;
      background: var(--ua-white);
    }

    .chat-input-area textarea {
      flex: 1;
      border: 1.5px solid #CBD5DA;
      border-radius: 22px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 0.93rem;
      resize: none;
      outline: none;
      line-height: 1.4;
      max-height: 100px;
      overflow-y: auto;
      transition: border-color 0.2s;
      color: var(--ua-text);
    }

    .chat-input-area textarea:focus {
      border-color: var(--ua-teal);
    }

    .chat-input-area textarea::placeholder {
      color: var(--ua-text-muted);
    }

    .btn-send {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: var(--ua-teal);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-send:hover  { background: var(--ua-teal-dark); }
    .btn-send:active { transform: scale(0.93); }

    .btn-send svg {
      width: 20px;
      height: 20px;
      fill: var(--ua-white);
    }

    /* ---- Rodapé / nota ---- */
    .chat-footer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--ua-text-muted);
      padding: 8px 0 4px;
    }

    /* ---- Responsividade ---- */
    @media (max-width: 480px) {
      .chat-wrapper { border-radius: 12px; }
      .message      { max-width: 90%; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       ESTRUTURA DO CHAT
  ============================================================ -->
  <div class="chat-wrapper" role="main" aria-label="Chat SALInA">

    <!-- Cabeçalho -->
    <header class="chat-header">
      <div class="avatar" aria-hidden="true">🎓</div>
      <div class="info">
        <h1>SALInA</h1>
        <p><span class="status-dot"></span>Assistente do Aluno · Universidade de Aveiro</p>
      </div>
    </header>

    <!-- Histórico de mensagens -->
    <section
      class="chat-messages"
      id="chatMessages"
      role="log"
      aria-live="polite"
      aria-label="Histórico de conversa"
    ></section>

    <!-- Campo de input + botão Enviar -->
    <div class="chat-input-area">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Escreva a sua pergunta…"
        aria-label="Campo de pergunta"
      ></textarea>
      <button
        class="btn-send"
        id="btnSend"
        aria-label="Enviar mensagem"
        title="Enviar"
      >
        <!-- Ícone de envio (seta) -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- Nota de rodapé -->
  <p class="chat-footer">SALInA · Projeto de Mestrado — Universidade de Aveiro</p>


  <!-- ============================================================

    // ------------------------------------------------------------------
    // UTILITÁRIOS
    // ------------------------------------------------------------------

    /**
     * Normaliza texto: converte para minúsculas e remove acentos.
     * Usado para comparação insensível a maiúsculas/acentos.
     * @param {string} texto
     * @returns {string}
     */
    function normalizar(texto) {
      return texto
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, ""); // remove diacríticos
    }

    /**
     * Retorna a hora atual formatada em HH:MM.
     * @returns {string}
     */
    function horaAtual() {
      return new Date().toLocaleTimeString("pt-PT", { hour: "2-digit", minute: "2-digit" });
    }

    // ------------------------------------------------------------------
    // RENDERIZAÇÃO DE MENSAGENS
    // ------------------------------------------------------------------

    /**
     * Adiciona um balão de mensagem ao histórico do chat.
     * @param {string} texto   - Conteúdo HTML ou texto da mensagem
     * @param {"user"|"bot"} tipo - Autor da mensagem
     */
    function adicionarMensagem(texto, tipo) {
      const chatMessages = document.getElementById("chatMessages");

      const wrapper = document.createElement("div");
      wrapper.classList.add("message", tipo);

      const bubble = document.createElement("div");
      bubble.classList.add("bubble");
      bubble.innerHTML = texto; // permite HTML seguro (links formatados)

      const ts = document.createElement("span");
      ts.classList.add("timestamp");
      ts.textContent = horaAtual();

      wrapper.appendChild(bubble);
      wrapper.appendChild(ts);
      chatMessages.appendChild(wrapper);

      // Faz scroll automático até à última mensagem
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    /**
     * Mostra o indicador de digitação animado (três pontos).
     * @returns {HTMLElement} referência ao elemento, para removê-lo depois
     */
    function mostrarIndicadorDigitacao() {
      const chatMessages = document.getElementById("chatMessages");

      const wrapper = document.createElement("div");
      wrapper.classList.add("message", "bot", "typing-indicator");

      wrapper.innerHTML = `
        <div class="bubble">
          <div class="dots">
            <span></span><span></span><span></span>
          </div>
        </div>`;

      chatMessages.appendChild(wrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return wrapper;
    }

    // ------------------------------------------------------------------
    // MOTOR DE BUSCA
    // ------------------------------------------------------------------

    /**
     * Procura na base de conhecimento a entrada cuja lista de
     * palavrasChave melhor corresponde à pergunta do utilizador.
     * Devolve o objeto encontrado ou null se não houver correspondência.
     * @param {string} pergunta - Texto digitado pelo utilizador
     * @returns {object|null}
     */
    function buscarResposta(pergunta) {
      const perguntaNorm = normalizar(pergunta);

      let melhorResultado = null;
      let melhorPontuacao = 0;

      for (const entrada of baseConhecimento) {
        let pontuacao = 0;

        for (const palavra of entrada.palavrasChave) {
          if (perguntaNorm.includes(normalizar(palavra))) {
            pontuacao++;
          }
        }

        // Escolhe a entrada com mais palavras-chave correspondentes
        if (pontuacao > melhorPontuacao) {
          melhorPontuacao = pontuacao;
          melhorResultado = entrada;
        }
      }

      // Requer pelo menos 1 correspondência para considerar válida
      return melhorPontuacao >= 1 ? melhorResultado : null;
    }

    // ------------------------------------------------------------------
    // LÓGICA PRINCIPAL DO ENVIO
    // ------------------------------------------------------------------

    /**
     * Processa a pergunta do utilizador:
     * 1. Exibe o balão do utilizador
     * 2. Mostra indicador de digitação (simula latência)
     * 3. Exibe a resposta encontrada (ou mensagem de fallback)
     */
    function processarPergunta() {
      const input = document.getElementById("userInput");
      const texto = input.value.trim();

      // Ignora envios vazios
      if (!texto) return;

      // 1. Exibe mensagem do utilizador
      adicionarMensagem(escapeHTML(texto), "user");
      input.value = "";
      input.style.height = "auto"; // reset da altura do textarea

      // 2. Indicador de digitação (300 ms de simulação)
      const indicador = mostrarIndicadorDigitacao();

      setTimeout(() => {
        // Remove o indicador
        indicador.remove();

        // 3. Busca e exibe resposta
        const resultado = buscarResposta(texto);

        if (resultado) {
          // Monta HTML da resposta com link opcional
          let htmlResposta = escapeHTML(resultado.resposta);

          if (resultado.link && resultado.link.trim() !== "") {
            htmlResposta += `<br><a
              class="response-link"
              href="${escapeAttr(resultado.link)}"
              target="_blank"
              rel="noopener noreferrer"
            >Saber mais →</a>`;
          }

          adicionarMensagem(htmlResposta, "bot");
        } else {
          // Mensagem de fallback educada
          adicionarMensagem(
            "Peço desculpa, não encontrei uma resposta para a sua questão na minha base de dados. " +
            "Para obter ajuda personalizada, contacte os Serviços Académicos da UA ou consulte o portal " +
            "<a class=\"response-link\" href=\"https://www.ua.pt\" target=\"_blank\" rel=\"noopener noreferrer\">ua.pt →</a>",
            "bot"
          );
        }
      }, 700); // atraso em milissegundos (ajustável)
    }

    // ------------------------------------------------------------------
    // SEGURANÇA: escape de HTML e atributos
    // Evita XSS ao renderizar o texto digitado pelo utilizador.
    // ------------------------------------------------------------------

    /**
     * Escapa caracteres especiais de HTML num texto simples.
     * @param {string} str
     * @returns {string}
     */
    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    /**
     * Escapa uma URL para uso seguro em atributos HTML.
     * Só permite https:// e http:// para prevenir javascript: URIs.
     * @param {string} url
     * @returns {string}
     */
    function escapeAttr(url) {
      const sanitized = String(url).trim();
      if (!/^https?:\/\//i.test(sanitized)) return "#";
      return sanitized.replace(/"/g, "%22");
    }

    // ------------------------------------------------------------------
    // EVENTOS DA INTERFACE
    // ------------------------------------------------------------------

    // Clique no botão Enviar
    document.getElementById("btnSend").addEventListener("click", processarPergunta);

    // Pressionar Enter envia; Shift+Enter cria nova linha
    document.getElementById("userInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        processarPergunta();
      }
    });

    // Auto-expansão do textarea conforme o utilizador digita
    document.getElementById("userInput").addEventListener("input", function () {
      this.style.height = "auto";
      this.style.height = Math.min(this.scrollHeight, 100) + "px";
    });

    // ------------------------------------------------------------------
    // MENSAGEM DE BOAS-VINDAS (exibida ao carregar a página)
    // ------------------------------------------------------------------
    (function init() {
      adicionarMensagem(
        "Olá! 👋 Sou o <strong>SALInA</strong>, o Assistente do Aluno da Universidade de Aveiro. " +
        "Como posso ajudá-lo hoje? Pode perguntar sobre <em>matrículas, bolsas, horários</em> e muito mais.",
        "bot"
      );
    })();
  </script>
